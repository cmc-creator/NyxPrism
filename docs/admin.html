<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NyxPrism Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #06080d;
      --surface:      #0d1117;
      --border:       #1e2432;
      --text:         #e8eaf0;
      --text2:        #8b92a8;
      --muted:        #555e78;
      --accent:       #7c3aed;
      --accent-bright:#a78bfa;
      --accent-glow:  rgba(124,58,237,.15);
      --green:        #22c55e;
      --red:          #f87171;
      --blue:         #60a5fa;
      --yellow:       #fbbf24;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── LOCK SCREEN ─────────────────────────────────────────────── */
    #lock-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .lock-logo { display: flex; align-items: center; gap: .6rem; font-weight: 700; font-size: 1.1rem; }
    .lock-logo span { color: var(--accent-bright); }
    .lock-title { font-size: 1.3rem; font-weight: 700; }
    .lock-sub { color: var(--text2); font-size: .88rem; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--text2); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .05em; }
    .field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .65rem .85rem; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: .9rem; outline: none;
    }
    .field input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: .75rem; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .err-msg { color: var(--red); font-size: .85rem; display: none; }

    /* ── ADMIN SHELL ─────────────────────────────────────────────── */
    #admin-shell { display: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 1.5rem 0;
    }
    .sidebar-logo { padding: 0 1.25rem 1.5rem; font-weight: 700; font-size: 1rem; color: var(--accent-bright); }
    .nav-item {
      display: block; width: 100%; background: none; border: none; text-align: left;
      padding: .65rem 1.25rem; color: var(--text2); font-size: .9rem; cursor: pointer;
      transition: background .15s, color .15s; border-radius: 0;
    }
    .nav-item:hover { background: var(--accent-glow); color: var(--text); }
    .nav-item.active { color: var(--accent-bright); background: var(--accent-glow); font-weight: 600; }
    .sidebar-footer { margin-top: auto; padding: 1rem 1.25rem; }
    .btn-logout {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--text2); border-radius: 8px; padding: .55rem; font-size: .85rem;
      cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }
    .main { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* ── TABS ────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: .5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .tab {
      background: none; border: none; color: var(--text2); font-size: .9rem;
      padding: .6rem 1rem .7rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-bright); border-bottom-color: var(--accent-bright); font-weight: 600; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── STAT CARDS ──────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .stat-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
    .stat-value { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-value.accent { color: var(--accent-bright); }
    .stat-value.blue   { color: var(--blue); }
    .stat-value.yellow { color: var(--yellow); }
    .plan-breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .plan-list { display: flex; flex-direction: column; gap: .5rem; }
    .plan-pill { display: flex; justify-content: space-between; align-items: center; }
    .pill-name { color: var(--text2); font-size: .88rem; text-transform: capitalize; }
    .pill-count { color: var(--accent-bright); font-weight: 700; }

    /* ── TABLES ──────────────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    th { text-align: left; color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; padding: .6rem .75rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: .65rem .75rem; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }
    .badge { display: inline-block; font-size: .7rem; font-weight: 700; padding: .15rem .55rem; border-radius: 999px; text-transform: capitalize; }
    .badge-active   { background: rgba(34,197,94,.12);  color: var(--green); }
    .badge-trial    { background: rgba(96,165,250,.12);  color: var(--blue); }
    .badge-inactive { background: rgba(248,113,113,.12); color: var(--red); }
    .badge-pro      { background: var(--accent-glow);    color: var(--accent-bright); }
    .pagination { display: flex; gap: .5rem; align-items: center; margin-top: 1rem; font-size: .85rem; color: var(--text2); }
    .pagination button { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: .3rem .75rem; cursor: pointer; font-size: .82rem; }
    .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-bright); }
    .pagination button:disabled { opacity: .35; cursor: not-allowed; }
    .msg-body { max-width: 400px; white-space: pre-wrap; word-break: break-word; }
    .unread { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ─────────────────────────────────────────────────────── -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-logo">&#x25E6;&nbsp;<span>NyxPrism</span> Admin</div>
    <div>
      <div class="lock-title">Sign in</div>
      <div class="lock-sub" style="margin-top:.35rem">Enter your admin secret to continue.</div>
    </div>
    <div class="field">
      <label>Admin Secret</label>
      <input type="password" id="secret-input" autocomplete="current-password" placeholder="••••••••••••" />
    </div>
    <button class="btn-primary" id="login-btn">Sign in</button>
    <div class="err-msg" id="login-err"></div>
  </div>
</div>

<!-- ── ADMIN SHELL ─────────────────────────────────────────────────────── -->
<div id="admin-shell">
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-logo">&#x25E6; NyxPrism</div>
      <button class="nav-item active" data-tab="overview">Overview</button>
      <button class="nav-item" data-tab="users">Users</button>
      <button class="nav-item" data-tab="messages">Messages</button>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logout-btn">Sign out</button>
      </div>
    </nav>
    <main class="main">
      <div id="tab-overview" class="tab-pane active">
        <div class="page-title">Overview</div>
        <div class="stat-grid" id="stat-grid"><p style="color:var(--muted)">Loading…</p></div>
        <div class="plan-breakdown" id="plan-breakdown"></div>
      </div>
      <div id="tab-users" class="tab-pane">
        <div class="page-title">Users</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Email</th><th>Name</th><th>Plan</th><th>Status</th><th>Joined</th>
            </tr></thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
        <div class="pagination" id="users-pager"></div>
      </div>
      <div id="tab-messages" class="tab-pane">
        <div class="page-title">Contact Messages</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>From</th><th>Subject</th><th>Message</th><th>Date</th>
            </tr></thead>
            <tbody id="messages-body"></tbody>
          </table>
        </div>
        <div class="pagination" id="messages-pager"></div>
      </div>
    </main>
  </div>
</div>

<script>
const API = 'https://nyxprism-production.up.railway.app';
let adminSecret = '';

function headers() {
  return { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret };
}

async function apiFetch(path) {
  const res = await fetch(API + path, { headers: headers() });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Login ─────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', tryLogin);
document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

async function tryLogin() {
  const input = document.getElementById('secret-input').value.trim();
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  if (!input) { errEl.textContent = 'Enter the admin secret.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Verifying…';
  // Test the secret against the real API
  try {
    adminSecret = input;
    await apiFetch('/api/admin/stats');
    // Success
    sessionStorage.setItem('adminSecret', adminSecret);
    openShell();
  } catch (err) {
    adminSecret = '';
    errEl.textContent = 'Wrong secret.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function openShell() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('admin-shell').style.display = 'block';
  loadOverview();
}

// ── Logout ────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  adminSecret = '';
  sessionStorage.removeItem('adminSecret');
  document.getElementById('admin-shell').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('secret-input').value = '';
});

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'users')    loadUsers(1);
    if (btn.dataset.tab === 'messages') loadMessages(1);
  });
});

// ── Overview ──────────────────────────────────────────────────────────────
async function loadOverview() {
  try {
    const data = await apiFetch('/api/admin/stats');
    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value accent">${data.totalUsers}</div></div>
      <div class="stat-card"><div class="stat-label">API Keys</div><div class="stat-value blue">${data.totalApiKeys}</div></div>
      <div class="stat-card"><div class="stat-label">Messages</div><div class="stat-value yellow">${data.totalMessages}</div></div>
    `;
    document.getElementById('plan-breakdown').innerHTML =
      '<div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.75rem">Plan Breakdown</div>' +
      '<div class="plan-list">' + data.plans.map(p =>
        `<div class="plan-pill"><span class="pill-name">${p.plan}</span><span class="pill-count">${p.count}</span></div>`
      ).join('') + '</div>';
  } catch (err) {
    document.getElementById('stat-grid').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
  }
}

// ── Users ─────────────────────────────────────────────────────────────────
async function loadUsers(page) {
  const tbody = document.getElementById('users-body');
  const pager = document.getElementById('users-pager');
  tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">Loading…</td></tr>';
  try {
    const data = await apiFetch(`/api/admin/users?page=${page}&limit=50`);
    if (!data.users.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted)">No users yet.</td></tr>'; return; }
    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td>${u.email}</td>
        <td>${[u.first_name, u.last_name].filter(Boolean).join(' ') || '<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="badge badge-${u.plan || 'trial'}">${u.plan || 'trial'}</span></td>
        <td><span class="badge badge-${u.subscription_status === 'active' ? 'active' : u.subscription_status === 'trialing' ? 'trial' : 'inactive'}">${u.subscription_status || '—'}</span></td>
        <td>${new Date(u.created_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
    const total = data.total;
    const pages = Math.ceil(total / 50);
    pager.innerHTML = `
      <button ${page <= 1 ? 'disabled' : ''} onclick="loadUsers(${page-1})">&#8592; Prev</button>
      <span>Page ${page} of ${pages} (${total} total)</span>
      <button ${page >= pages ? 'disabled' : ''} onclick="loadUsers(${page+1})">Next &#8594;</button>
    `;
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--red)">${err.message}</td></tr>`;
  }
}

// ── Messages ──────────────────────────────────────────────────────────────
async function loadMessages(page) {
  const tbody = document.getElementById('messages-body');
  const pager = document.getElementById('messages-pager');
  tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">Loading…</td></tr>';
  try {
    const data = await apiFetch(`/api/admin/messages?page=${page}&limit=20`);
    if (!data.messages.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">No messages yet.</td></tr>'; return; }
    tbody.innerHTML = data.messages.map(m => `
      <tr>
        <td class="${m.read ? '' : 'unread'}">${m.first_name || ''} ${m.last_name || ''}<br><span style="font-size:.78rem;color:var(--muted)">${m.email}</span></td>
        <td class="${m.read ? '' : 'unread'}">${m.subject || '—'}</td>
        <td><div class="msg-body">${m.message}</div></td>
        <td style="white-space:nowrap">${new Date(m.created_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
    const total = data.total;
    const pages = Math.ceil(total / 20);
    pager.innerHTML = `
      <button ${page <= 1 ? 'disabled' : ''} onclick="loadMessages(${page-1})">&#8592; Prev</button>
      <span>Page ${page} of ${pages} (${total} total)</span>
      <button ${page >= pages ? 'disabled' : ''} onclick="loadMessages(${page+1})">Next &#8594;</button>
    `;
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="4" style="color:var(--red)">${err.message}</td></tr>`;
  }
}

// ── Auto-restore session ──────────────────────────────────────────────────
const saved = sessionStorage.getItem('adminSecret');
if (saved) { adminSecret = saved; apiFetch('/api/admin/stats').then(() => openShell()).catch(() => { adminSecret = ''; sessionStorage.removeItem('adminSecret'); }); }
</script>
</body>
</html>
