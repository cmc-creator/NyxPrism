<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NyxPrism Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #06080d;
      --bg2:           #0b0f18;
      --surface:       #0f1724;
      --surface2:      #141e2e;
      --surface3:      #1a2535;
      --border:        #1b2840;
      --border2:       #253548;
      --border3:       #2d4060;
      --accent:        #7c3aed;
      --accent2:       #6d28d9;
      --accent-bright: #a78bfa;
      --accent-glow:   rgba(124,58,237,.14);
      --muted:         #5a7194;
      --muted2:        #3a4f6a;
      --text:          #e8edf5;
      --text2:         #bbc8da;
      --text3:         #7f96b2;
      --green:         #22c55e;
      --red:           #f87171;
      --yellow:        #facc15;
      --blue:          #60a5fa;
      --radius:        .55rem;
      --radius-sm:     .35rem;
      --radius-lg:     1rem;
      --sidebar-w:     220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* LOCK SCREEN */
    #lock-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .lock-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 2.5rem 2.25rem; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1.2rem; }
    .lock-title { font-size: 1.25rem; font-weight: 700; }
    .lock-sub   { font-size: .875rem; color: var(--text3); }
    .lock-input { width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: .875rem; padding: .65rem .85rem; outline: none; }
    .lock-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .lock-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: .875rem; font-weight: 600; padding: .7rem 1.5rem; cursor: pointer; width: 100%; }
    .lock-btn:hover { background: var(--accent2); }
    .lock-error { font-size: .8rem; color: var(--red); display: none; }

    /* ADMIN SHELL */
    #admin-shell { display: none; flex: 1; }
    .admin-layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .admin-sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-brand { padding: 1.4rem 1.25rem 1rem; border-bottom: 1px solid var(--border); }
    .sidebar-wordmark { font-size: 1rem; font-weight: 800; letter-spacing: -.015em; }
    .sidebar-wordmark em { font-style: normal; color: var(--accent-bright); }
    .sidebar-badge { display: inline-block; margin-top: .35rem; font-size: .65rem; background: var(--accent-glow); color: var(--accent-bright); border-radius: 999px; padding: .15rem .55rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-section-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted2); padding: .5rem 1.25rem .3rem; margin-top: .25rem; }
    .nav-item { display: flex; align-items: center; gap: .7rem; padding: .6rem 1.25rem; font-size: .875rem; font-weight: 500; color: var(--text3); cursor: pointer; border-left: 2px solid transparent; transition: color .15s, background .15s, border-color .15s; user-select: none; }
    .nav-item:hover { color: var(--text2); background: rgba(255,255,255,.03); }
    .nav-item.active { color: var(--accent-bright); border-left-color: var(--accent-bright); background: var(--accent-glow); }
    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .8; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
    .sidebar-logout { width: 100%; background: none; border: 1px solid var(--border2); color: var(--text3); border-radius: var(--radius-sm); font-size: .8rem; padding: .5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .sidebar-logout:hover { color: var(--text); border-color: var(--border3); }

    /* MAIN */
    .admin-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .admin-topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: .9rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 1.05rem; font-weight: 700; }
    .topbar-sub { font-size: .78rem; color: var(--muted); margin-top: .1rem; }
    .admin-body { flex: 1; padding: 2rem; }

    /* STAT CARDS */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .stat-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: .4rem; }
    .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }
    .stat-value.accent { color: var(--accent-bright); }
    .stat-value.blue   { color: var(--blue); }
    .stat-value.yellow { color: var(--yellow); }

    /* PLAN PILLS */
    .plan-list { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 2rem; }
    .plan-pill { display: flex; align-items: center; gap: .6rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 999px; padding: .4rem 1rem; font-size: .875rem; }
    .plan-pill .pill-name { font-weight: 600; text-transform: capitalize; }
    .plan-pill .pill-count { color: var(--accent-bright); font-weight: 700; }

    /* TABLE */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    th { text-align: left; color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .07em; padding: .6rem .75rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: .65rem .75rem; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .badge { display: inline-block; font-size: .7rem; font-weight: 700; padding: .15rem .55rem; border-radius: 999px; text-transform: capitalize; }
    .badge-active   { background: rgba(34,197,94,.12);  color: var(--green); }
    .badge-trial    { background: rgba(96,165,250,.12);  color: var(--blue); }
    .badge-inactive { background: rgba(248,113,113,.12); color: var(--red); }
    .badge-pro      { background: var(--accent-glow);    color: var(--accent-bright); }
    .badge-free     { background: rgba(90,113,148,.12);  color: var(--muted); }

    /* PAGINATION */
    .pager { display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem; }
    .pager-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); font-size: .8rem; padding: .45rem .9rem; cursor: pointer; }
    .pager-btn:disabled { opacity: .35; cursor: default; }
    .pager-btn:not(:disabled):hover { border-color: var(--border3); color: var(--text); }
    .pager-info { font-size: .8rem; color: var(--muted); }

    /* MISC */
    .loading { color: var(--muted); font-size: .875rem; padding: 2rem 0; }
    .err-msg  { color: var(--red); font-size: .875rem; padding: 1rem 0; }

    /* MESSAGE CARDS */
    .msg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: .85rem; }
    .msg-meta { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; flex-wrap: wrap; }
    .msg-name  { font-weight: 600; font-size: .9rem; }
    .msg-email { font-size: .8rem; color: var(--text3); }
    .msg-date  { font-size: .75rem; color: var(--muted); margin-left: auto; }
    .msg-subject { font-size: .875rem; font-weight: 600; margin-bottom: .5rem; color: var(--text); }
    .msg-body  { font-size: .84rem; color: var(--text2); line-height: 1.65; white-space: pre-wrap; }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    @media (max-width: 640px) {
      .admin-sidebar { display: none; }
      .admin-body { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <div>
      <div class="lock-title"><em style="font-style:normal;color:#a78bfa">Nyx</em>Prism Admin</div>
      <div class="lock-sub" style="margin-top:.4rem">Enter your admin secret to continue.</div>
    </div>
    <input class="lock-input" type="password" id="secret-input" placeholder="Admin secret" autocomplete="off" />
    <button class="lock-btn" id="unlock-btn">Unlock</button>
    <div class="lock-error" id="lock-error">Incorrect secret or server not configured.</div>
  </div>
</div>

<!-- ADMIN SHELL -->
<div id="admin-shell">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-wordmark"><em>Nyx</em>Prism</div>
        <div class="sidebar-badge">Admin</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Dashboard</div>
        <div class="nav-item active" data-panel="overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Overview
        </div>
        <div class="nav-section-label">Data</div>
        <div class="nav-item" data-panel="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
          <span id="nav-user-count" style="margin-left:auto;font-size:.72rem;color:var(--muted);font-weight:600"></span>
        </div>
        <div class="nav-item" data-panel="messages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Messages
          <span id="nav-msg-count" style="margin-left:auto;font-size:.72rem;color:var(--muted);font-weight:600"></span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" id="logout-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Log Out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <div class="admin-main">
      <div class="admin-topbar">
        <div>
          <div class="topbar-title" id="topbar-title">Overview</div>
          <div class="topbar-sub" id="topbar-sub">Summary of all activity</div>
        </div>
      </div>
      <div class="admin-body">

        <!-- Overview panel -->
        <div class="panel active" id="panel-overview">
          <div class="stat-grid" id="stat-grid"><div class="loading">Loading stats...</div></div>
          <div id="plan-breakdown"></div>
        </div>

        <!-- Users panel -->
        <div class="panel" id="panel-users">
          <div class="tbl-wrap">
            <table>
              <thead>
                <tr><th>Email</th><th>Name</th><th>Plan</th><th>Status</th><th>Trial</th><th>Period End</th><th>Joined</th></tr>
              </thead>
              <tbody id="users-tbody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
            </table>
          </div>
          <div class="pager" id="users-pager" style="display:none">
            <button class="pager-btn" id="users-prev" disabled>Prev</button>
            <span class="pager-info" id="users-info"></span>
            <button class="pager-btn" id="users-next">Next</button>
          </div>
        </div>

        <!-- Messages panel -->
        <div class="panel" id="panel-messages">
          <div id="messages-list"><div class="loading">Loading...</div></div>
          <div class="pager" id="messages-pager" style="display:none">
            <button class="pager-btn" id="msgs-prev" disabled>Prev</button>
            <span class="pager-info" id="msgs-info"></span>
            <button class="pager-btn" id="msgs-next">Next</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://nyxprism-production.up.railway.app';
let adminSecret = '';

const PANEL_META = {
  overview: { title: 'Overview',  sub: 'Summary of all activity' },
  users:    { title: 'Users',     sub: 'All registered accounts' },
  messages: { title: 'Messages',  sub: 'Contact form submissions' },
};

async function apiFetch(path) {
  const res = await fetch(`${API}${path}`, { headers: { 'x-admin-secret': adminSecret } });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}
function fmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function planBadge(p) {
  const c = { pro:'badge-pro', trial:'badge-trial', free:'badge-free' }[p] || 'badge-free';
  return `<span class="badge ${c}">${p||'free'}</span>`;
}
function statusBadge(s) {
  const c = { active:'badge-active', trialing:'badge-trial', canceled:'badge-inactive', past_due:'badge-inactive', inactive:'badge-inactive' }[s] || 'badge-inactive';
  return `<span class="badge ${c}">${s||'inactive'}</span>`;
}

// Lock screen
document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
document.getElementById('secret-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

async function tryUnlock() {
  const secret = document.getElementById('secret-input').value.trim();
  if (!secret) return;
  adminSecret = secret;
  const errEl = document.getElementById('lock-error');
  errEl.style.display = 'none';
  try {
    await apiFetch('/api/admin/stats');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'block';
    loadOverview();
  } catch {
    errEl.style.display = 'block';
    adminSecret = '';
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  adminSecret = '';
  document.getElementById('admin-shell').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('secret-input').value = '';
});

// Navigation
document.querySelectorAll('.nav-item[data-panel]').forEach(item => {
  item.addEventListener('click', () => switchPanel(item.dataset.panel));
});

function switchPanel(name) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.panel === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${name}`));
  const meta = PANEL_META[name] || {};
  document.getElementById('topbar-title').textContent = meta.title || name;
  document.getElementById('topbar-sub').textContent   = meta.sub   || '';
  if (name === 'users'    && !usersLoaded)   loadUsers(1);
  if (name === 'messages' && !msgsLoaded)    loadMessages(1);
}

// Overview
async function loadOverview() {
  try {
    const data = await apiFetch('/api/admin/stats');
    document.getElementById('stat-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value accent">${data.totalUsers}</div></div>
      <div class="stat-card"><div class="stat-label">API Keys</div><div class="stat-value blue">${data.totalApiKeys}</div></div>
      <div class="stat-card"><div class="stat-label">Messages</div><div class="stat-value yellow">${data.totalMessages}</div></div>`;
    document.getElementById('plan-breakdown').innerHTML =
      `<div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.75rem">Plan Breakdown</div>
       <div class="plan-list">${data.plans.map(p=>`<div class="plan-pill"><span class="pill-name">${esc(p.plan)}</span><span class="pill-count">${p.count}</span></div>`).join('')}</div>`;
    document.getElementById('nav-user-count').textContent = data.totalUsers || '';
    document.getElementById('nav-msg-count').textContent  = data.totalMessages || '';
  } catch (err) {
    document.getElementById('stat-grid').innerHTML = `<p class="err-msg">Failed: ${esc(err.message)}</p>`;
  }
}

// Users
let usersPage = 1, userTotal = 0, usersLoaded = false;
const USERS_LIMIT = 50;

async function loadUsers(page) {
  usersLoaded = true;
  usersPage = page;
  document.getElementById('users-tbody').innerHTML = '<tr><td colspan="7" class="loading">Loading...</td></tr>';
  try {
    const data = await apiFetch(`/api/admin/users?page=${page}&limit=${USERS_LIMIT}`);
    userTotal = data.total;
    document.getElementById('users-tbody').innerHTML = data.users.length
      ? data.users.map(u => `<tr>
          <td>${esc(u.email)}</td>
          <td>${esc([u.first_name,u.last_name].filter(Boolean).join(' ')||'—')}</td>
          <td>${planBadge(u.plan)}</td>
          <td>${statusBadge(u.subscription_status)}</td>
          <td>${u.trial_active?'<span class="badge badge-trial">Yes</span>':'—'}</td>
          <td>${fmt(u.current_period_end)}</td>
          <td>${fmt(u.created_at)}</td>
        </tr>`).join('')
      : '<tr><td colspan="7" style="color:var(--muted)">No users yet.</td></tr>';
    const pager = document.getElementById('users-pager');
    pager.style.display = 'flex';
    document.getElementById('users-prev').disabled = page <= 1;
    document.getElementById('users-next').disabled = page * USERS_LIMIT >= userTotal;
    document.getElementById('users-info').textContent = `${(page-1)*USERS_LIMIT+1}–${Math.min(page*USERS_LIMIT,userTotal)} of ${userTotal}`;
  } catch (err) {
    document.getElementById('users-tbody').innerHTML = `<tr><td colspan="7" class="err-msg">Error: ${esc(err.message)}</td></tr>`;
  }
}
document.getElementById('users-prev').addEventListener('click', () => loadUsers(usersPage - 1));
document.getElementById('users-next').addEventListener('click', () => loadUsers(usersPage + 1));

// Messages
let msgsPage = 1, msgsTotal = 0, msgsLoaded = false;
const MSGS_LIMIT = 20;

async function loadMessages(page) {
  msgsLoaded = true;
  msgsPage = page;
  document.getElementById('messages-list').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await apiFetch(`/api/admin/messages?page=${page}&limit=${MSGS_LIMIT}`);
    msgsTotal = data.total;
    if (!data.messages.length) {
      document.getElementById('messages-list').innerHTML = '<p style="color:var(--muted);font-size:.875rem">No messages yet.</p>';
      document.getElementById('messages-pager').style.display = 'none';
      return;
    }
    document.getElementById('messages-list').innerHTML = data.messages.map(m => `
      <div class="msg-card">
        <div class="msg-meta">
          <span class="msg-name">${esc((m.first_name||'')+' '+(m.last_name||'')).trim()}</span>
          <span class="msg-email">${esc(m.email||'')}</span>
          <span class="msg-date">${fmt(m.created_at)}</span>
        </div>
        <div class="msg-subject">${esc(m.subject||'')}</div>
        <div class="msg-body">${esc(m.message||'')}</div>
      </div>`).join('');
    const pager = document.getElementById('messages-pager');
    pager.style.display = 'flex';
    document.getElementById('msgs-prev').disabled = page <= 1;
    document.getElementById('msgs-next').disabled = page * MSGS_LIMIT >= msgsTotal;
    document.getElementById('msgs-info').textContent = `${(page-1)*MSGS_LIMIT+1}–${Math.min(page*MSGS_LIMIT,msgsTotal)} of ${msgsTotal}`;
  } catch (err) {
    document.getElementById('messages-list').innerHTML = `<p class="err-msg">Error: ${esc(err.message)}</p>`;
  }
}
document.getElementById('msgs-prev').addEventListener('click', () => loadMessages(msgsPage - 1));
document.getElementById('msgs-next').addEventListener('click', () => loadMessages(msgsPage + 1));
</script>
</body>
</html>
